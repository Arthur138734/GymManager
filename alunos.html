<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymManager - Alunos</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/alunos.css">
</head>

<body>

<div class="dashboard">

    <!-- MENU LATERAL -->
    <aside class="sidebar">

        <div class="logo">
            <h2>🏋️ GymManager</h2>
        </div>

        <nav>

            <ul>

                <li>
                    <a href="dashboard.html">🏠 Dashboard</a>
                </li>

                <li class="active">
                    <a href="alunos.html">👥 Alunos</a>
                </li>

                <li>
                    <a href="professores.html">👨‍🏫 Professores</a>
                </li>

                <li>
                    <a href="treinos.html">💪 Treinos</a>
                </li>

                <li>
                    <a href="exercicios.html">🏋️ Exercícios</a>
                </li>

                <li>
                    <a href="pagamentos.html">💳 Pagamentos</a>
                </li>

                <li>
                    <a href="configuracoes.html">⚙️ Configurações</a>
                </li>

                <li>
                    <a href="login.html">🚪 Sair</a>
                </li>

            </ul>

        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <!-- TOPO -->
        <header class="topbar">

            <div>

                <h1>Alunos</h1>

                <p>Gerenciamento de alunos da academia.</p>

            </div>

            <div class="user-info">

                🔔

                <span>Arthur</span>

            </div>

        </header>

        <!-- FORMULÁRIO -->
        <section class="form-card">

            <h2>Cadastro de Alunos</h2>

            <form id="studentForm">

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" id="cpf" required>
                </div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email">
                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Peso</label>
                        <input type="number" id="peso">
                    </div>

                    <div class="form-group">
                        <label>Altura</label>
                        <input type="number" step="0.01" id="altura">
                    </div>

                </div>

                <div class="form-group">

                    <label>Objetivo</label>

                    <select id="objetivo">

                        <option>Hipertrofia</option>
                        <option>Emagrecimento</option>
                        <option>Condicionamento</option>
                        <option>Reabilitação</option>

                    </select>

                </div>

                <div class="buttons">

                    <button type="submit">Salvar</button>

                    <button type="reset">Limpar</button>

                </div>

            </form>

        </section>

        <div class="search-box">

    <input
        type="text"
        id="searchStudent"
        placeholder="🔍 Pesquisar aluno...">

</div>

        <!-- TABELA -->
        <section class="table-card">

            <h2>Alunos Cadastrados</h2>

            <div class="search-box">

                <input
                    type="text"
                    id="searchStudent"
                    placeholder="🔍 Pesquisar aluno...">

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Objetivo</th>
                        <th>Status</th>
                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="studentsTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="js/alunos.js"></script>

</body>
</html>
