<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymManager - Configurações</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/configuracoes.css">
</head>

<body>

<div class="dashboard">

    <!-- MENU LATERAL -->
    <aside class="sidebar">

        <div class="logo">
            <h2>🏋️ GymManager</h2>
        </div>

        <nav>

            <ul>

                <li>
                    <a href="dashboard.html">🏠 Dashboard</a>
                </li>

                <li>
                    <a href="alunos.html">👥 Alunos</a>
                </li>

                <li>
                    <a href="professores.html">👨‍🏫 Professores</a>
                </li>

                <li>
                    <a href="treinos.html">💪 Treinos</a>
                </li>

                <li>
                    <a href="exercicios.html">🏋️ Exercícios</a>
                </li>

                <li>
                    <a href="pagamentos.html">💳 Pagamentos</a>
                </li>

                <li>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <a href="agendamentos.html">📅 Agendamentos</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </li>

                <li class="active">
                    <a href="configuracoes.html">⚙️ Configurações</a>
                </li>

                <li>
                    <a href="login.html" id="logout">🚪 Sair</a>
                </li>

            </ul>

        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <!-- TOPO -->
        <header class="topbar">

            <div>
                <h1>Configurações</h1>
                <p>Dados da Academia</p>
            </div>

            <div class="user-info">
                🔔
                <span id="nomeUsuario"></span>
            </div>

        </header>

        <!-- CONTEÚDO DA PÁGINA -->
        <section class="main-content">

            <div class="panel">

                <h2>Configurações da Academia</h2>

                <form id="configForm">

                    <div class="form-group">
                        <label>Nome da Academia</label>
                        <input type="text" id="nomeAcademia" required>
                    </div>

                    <div class="form-group">
                        <label>CNPJ</label>
                        <input type="text" id="cnpj">
                    </div>

                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="telefone">
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="email">
                    </div>

                    <div class="form-group">
                        <label>Endereço</label>
                        <input type="text" id="endereco">
                    </div>

                    <div class="form-group">
                        <label>Site</label>
                        <input type="text" id="site">
                    </div>

                    <div class="form-group">
                        <label>Horário de Funcionamento</label>
                        <input type="text" id="horario">
                    </div>

                    <div class="form-group">

                        <label>Logo (URL)</label>

                        <img
                            id="previewLogo"
                            class="logo-preview"
                            src="https://via.placeholder.com/120"
                            alt="Logo">

                        <input
                            type="text"
                            id="logo">

                    </div>

                    <button type="submit">
                        Salvar Configurações
                    </button>

                </form>

            </div>

        </section>

    </main>

</div>

<script src="js/configuracoes.js"></script>

</body>

</html>
