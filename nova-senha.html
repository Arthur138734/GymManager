<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <title>GymManager - Nova Senha</title>

                <link rel="stylesheet" href="css/login.css">
                <link rel="stylesheet" href="css/global.css">

                </head>

                <body>

                <div class="login-container">

                    <div class="login-card">

                            <h1>🏋️ GymManager</h1>

                                    <h2>Nova Senha</h2>

                                            <form id="novaSenhaForm">

                                                        <div class="input-group">

                                                                        <label>E-mail</label>

                                                                                        <input
                                                                                                            type="email"
                                                                                                                                id="email"
                                                                                                                                                    required>

                                                                                                                                                                </div>

                                                                                                                                                                            <div class="input-group">

                                                                                                                                                                                            <label>Nova senha</label>

                                                                                                                                                                                                            <input
                                                                                                                                                                                                                                type="password"
                                                                                                                                                                                                                                                    id="senha"
                                                                                                                                                                                                                                                                        required>

                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                <div class="input-group">

                                                                                                                                                                                                                                                                                                                <label>Confirmar senha</label>

                                                                                                                                                                                                                                                                                                                                <input
                                                                                                                                                                                                                                                                                                                                                    type="password"
                                                                                                                                                                                                                                                                                                                                                                        id="confirmarSenha"
                                                                                                                                                                                                                                                                                                                                                                                            required>

                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                    <button type="submit">

                                                                                                                                                                                                                                                                                                                                                                                                                                    Salvar Nova Senha

                                                                                                                                                                                                                                                                                                                                                                                                                                                </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                        </form>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <a href="login.html">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Voltar ao Login

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </a>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="js/novaSenha.js"></script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
