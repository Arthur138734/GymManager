<div class="container">

<section class="form-card">

<h1>Cadastro de Pagamentos</h1>

<form id="paymentForm">

<div class="form-group">

<label>Aluno</label>

<select id="aluno" required>

<option value="">Selecione um aluno</option>

</select>

</div>

<div class="form-row">

<div class="form-group">

<label>Valor</label>

<input
type="number"
id="valor"
step="0.01"
required>

</div>

<div class="form-group">

<label>Vencimento</label>

<input
type="date"
id="vencimento"
required>

</div>

</div>

<div class="form-row">

<div class="form-group">

<label>Forma de Pagamento</label>

<select id="formaPagamento">

<option>PIX</option>

<option>Cartão</option>

<option>Dinheiro</option>

<option>Boleto</option>

</select>

</div>

<div class="form-group">

<label>Status</label>

<select id="status">

<option>Pendente</option>

<option>Pago</option>

</select>

</div>

</div>

<div class="buttons">

<button type="submit">

Salvar

</button>

<button type="reset">

Limpar

</button>

</div>

</form>

</section>

<section class="table-card">

<h2>Pagamentos</h2>

<table>

<thead>

<tr>

<th>Aluno</th>

<th>Valor</th>

<th>Vencimento</th>

<th>Status</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="paymentsTable">

</tbody>

</table>

</section>
