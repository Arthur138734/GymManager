<div class="container">

    <section class="form-card">

        <h1>Cadastro de Treinos</h1>

        <form id="trainingForm">

            <div class="form-group">

                <label>Aluno</label>

                <select id="aluno" required>

                    <option value="">Selecione um aluno</option>

                </select>

            </div>

            <div class="form-group">

                <label>Professor</label>

                <select id="professor" required>

                    <option value="">Selecione um professor</option>

                </select>

            </div>

            <div class="form-group">

                <label>Nome do Treino</label>

                <input
                    type="text"
                    id="nomeTreino"
                    placeholder="Ex: Hipertrofia A"
                    required>

            </div>

<div class="form-group">

        <label>Objetivo</label>

            <input
                    type="text"
                            id="objetivo"
                                    placeholder="Hipertrofia, Emagrecimento, Resistência..."
                                            required>

                                            </div>

            <div class="form-group">

                <label>Observações</label>

                <textarea
                    id="observacoes"
                    rows="4"
                    placeholder="Informações adicionais..."></textarea>

            </div>

            <div class="buttons">

                <button type="submit">

                    Salvar

                </button>

                <button type="reset">

                    Limpar

                </button>

            </div>

        </form>

    </section>

    <section class="table-card">

        <h2>Treinos Cadastrados</h2>

        <div class="search-box">

                <input
                        <input
                        id="searchTreino"
                        placeholder="Pesquisar treino">

                                        </div>

        <table>

<thead>
    <tr>
        <th>Aluno</th>
        <th>Professor</th>
        <th>Treino</th>
        <th>Objetivo</th>
        <th>Status</th>
        <th>Ações</th>
    </tr>
</thead>

            <tbody id="trainingTable">

            </tbody>

        </table>

    </section>
